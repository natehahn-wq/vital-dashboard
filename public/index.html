<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>VITAL · Health Intelligence</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%;-webkit-font-smoothing:antialiased}
    #loading{display:flex;flex-direction:column;align-items:center;justify-content:center;
      height:100vh;background:#F4EFE8;font-family:system-ui,sans-serif;gap:12px}
    #loading-title{font-size:22px;font-weight:600;color:#2C2420;letter-spacing:-0.02em}
    #loading-sub{font-size:12px;color:#8C7B70;max-width:400px;text-align:center;line-height:1.5}
    .spinner{width:32px;height:32px;border:3px solid #E8E4DE;border-top-color:#C47830;
      border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    input[type=range]{-webkit-appearance:none;height:4px;border-radius:2px;
      background:rgba(128,128,128,.2);outline:none}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;
      border-radius:50%;cursor:pointer}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(128,128,128,.3);border-radius:2px}
  </style>
</head>
<body>
  <div id="root">
    <div id="loading">
      <div class="spinner"></div>
      <div id="loading-title">VITAL</div>
      <div id="loading-sub">Loading health intelligence...</div>
    </div>
  </div>

  <!-- React 18 + Recharts from CDN -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.min.js"></script>

  <script>
    // Expose globals before dashboard loads
    const { useState, useEffect, useRef, useCallback, useMemo } = React;
    const {
      AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer,
      RadarChart, Radar, PolarGrid, PolarAngleAxis, PolarRadiusAxis,
      BarChart, Bar, Cell, PieChart, Pie, LineChart, Line, ReferenceLine, ComposedChart
    } = Recharts;

    window.onerror = (msg, src, line, col, err) => {
      const sub = document.getElementById('loading-sub');
      if (sub) sub.textContent = 'Error on line ' + line + ': ' + (err ? err.message : msg);
      console.error('VITAL error:', err || msg, 'line:', line);
    };
    window.onunhandledrejection = (e) => {
      const sub = document.getElementById('loading-sub');
      if (sub) sub.textContent = 'Promise error: ' + e.reason;
    };
  </script>

  <!-- Pre-compiled dashboard (JSX → JS via esbuild at Vercel build time) -->
  <script src="./vital-compiled.js"></script>

  <script>
    try {
            const App = (typeof __vital__ !== 'undefined' && __vital__.default) || window.App;
            if (!App) throw new Error('App not defined — build may have failed');
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(React.createElement(App));
    } catch(e) {
      const sub = document.getElementById('loading-sub');
      if (sub) sub.textContent = 'Mount error: ' + e.message;
      console.error('Mount error:', e);
    }
  </script>
</body>
</html>
